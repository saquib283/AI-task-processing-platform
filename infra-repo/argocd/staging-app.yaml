apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aitask-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/aitask-infra.git
    targetRevision: main
    path: overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: aitask-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
