apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aitask-production

resources:
  - ../../base

namePrefix: prod-

patches:
  # Production replica counts
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  # Higher resource limits for production
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: worker
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  # Production HPA
  - target:
      kind: HorizontalPodAutoscaler
      name: worker-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 5
      - op: replace
        path: /spec/maxReplicas
        value: 20

# Production-specific config
configMapGenerator:
  - name: aitask-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - CORS_ORIGIN=https://aitaskflow.example.com
      - NEXT_PUBLIC_API_URL=https://api.aitaskflow.example.com/api
      - WORKER_CONCURRENCY=10

images:
  - name: aitaskplatform/backend
    newTag: latest
  - name: aitaskplatform/frontend
    newTag: latest
  - name: aitaskplatform/worker
    newTag: latest
