name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: aitaskplatform/backend
  FRONTEND_IMAGE: aitaskplatform/frontend
  WORKER_IMAGE: aitaskplatform/worker

jobs:
  # ─── Lint & Test ────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, worker]

    steps:
      - uses: actions/checkout@v4

      # Node.js services
      - name: Setup Node.js
        if: matrix.service != 'worker'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies (Node)
        if: matrix.service != 'worker'
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Lint (Node)
        if: matrix.service != 'worker'
        working-directory: ${{ matrix.service }}
        run: npm run lint

      - name: Test (Node)
        if: matrix.service == 'backend'
        working-directory: ${{ matrix.service }}
        run: npm test

      # Python worker
      - name: Setup Python
        if: matrix.service == 'worker'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Python)
        if: matrix.service == 'worker'
        working-directory: worker
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (Python)
        if: matrix.service == 'worker'
        working-directory: worker
        run: ruff check src/

      - name: Test (Python)
        if: matrix.service == 'worker'
        working-directory: worker
        run: python -m pytest --tb=short -q || true

  # ─── Build & Push Docker Images ────────────────────────────
  build-and-push:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image_env: BACKEND_IMAGE
          - service: frontend
            context: ./frontend
            image_env: FRONTEND_IMAGE
          - service: worker
            context: ./worker
            image_env: WORKER_IMAGE

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env[matrix.image_env] }}:${{ steps.meta.outputs.sha_short }}
            ${{ env[matrix.image_env] }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Update Infra Repo (Staging) ──────────────────────────
  update-staging-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: your-org/aitask-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Update image tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | head -c 7)
          cd overlays/staging

          # Use kustomize to set image tags
          kustomize edit set image \
            aitaskplatform/backend=aitaskplatform/backend:${SHA_SHORT} \
            aitaskplatform/frontend=aitaskplatform/frontend:${SHA_SHORT} \
            aitaskplatform/worker=aitaskplatform/worker:${SHA_SHORT}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(staging): update images to ${{ github.sha }}" || exit 0
          git push
