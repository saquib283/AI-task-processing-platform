name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: aitaskplatform/backend
  FRONTEND_IMAGE: aitaskplatform/frontend
  WORKER_IMAGE: aitaskplatform/worker

jobs:
  # ─── Build & Push Production Images ────────────────────────
  build-production:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image_env: BACKEND_IMAGE
          - service: frontend
            context: ./frontend
            image_env: FRONTEND_IMAGE
          - service: worker
            context: ./worker
            image_env: WORKER_IMAGE

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env[matrix.image_env] }}:${{ steps.version.outputs.tag }}
            ${{ env[matrix.image_env] }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Create PR on Infra Repo for Production ───────────────
  create-production-pr:
    needs: build-production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: your-org/aitask-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release branch and update images
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          BRANCH="release/${VERSION}"

          git checkout -b ${BRANCH}
          cd overlays/production

          kustomize edit set image \
            aitaskplatform/backend=aitaskplatform/backend:${VERSION} \
            aitaskplatform/frontend=aitaskplatform/frontend:${VERSION} \
            aitaskplatform/worker=aitaskplatform/worker:${VERSION}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "release(production): deploy ${VERSION}"
          git push origin ${BRANCH}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          branch: release/${{ steps.version.outputs.tag }}
          title: "🚀 Deploy ${{ steps.version.outputs.tag }} to Production"
          body: |
            Automated release PR for production deployment.
            - Version: `${{ steps.version.outputs.tag }}`
            - Images tagged and pushed to Docker Hub
            - Merge to trigger Argo CD manual sync
          reviewers: your-team
